<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory - Cafe ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cafe ERP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/menu}">Menu</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link active" aria-current="page" th:href="@{/inventory}">Inventory</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link border-0 bg-transparent" style="text-decoration:none;">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Inventory</h1>
    </div>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Menu Item</th>
                <th>Category</th>
                <th>Track</th>
                <th>Stock</th>
                <th>Low Stock Threshold</th>
                <th>Last Updated</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(inventoryList)}">
                <td colspan="7" class="text-center text-muted py-4">No inventory records yet.</td>
            </tr>
            <tr th:each="inv : ${inventoryList}"
                th:classappend="${inv.trackInventory && inv.stockQuantity <= inv.lowStockThreshold} ? 'table-warning' : ''">
                <td th:text="${inv.menuItem.name}">Cappuccino</td>
                <td th:text="${inv.menuItem.category.name}">Beverages</td>
                <td>
                    <span class="badge text-bg-success" th:if="${inv.trackInventory}">On</span>
                    <span class="badge text-bg-secondary" th:unless="${inv.trackInventory}">Off</span>
                    <span class="badge text-bg-warning" th:if="${inv.trackInventory && inv.stockQuantity <= inv.lowStockThreshold}">Low Stock</span>
                </td>
                <td th:text="${inv.stockQuantity}">10</td>
                <td th:text="${inv.lowStockThreshold}">5</td>
                <td th:text="${inv.lastUpdatedAt != null ? #temporals.format(inv.lastUpdatedAt, 'yyyy-MM-dd HH:mm') : '—'}">2026-07-14 18:00</td>
                <td class="text-end">
                    <button class="btn btn-sm btn-outline-primary" type="button"
                            data-bs-toggle="collapse"
                            th:attr="data-bs-target='#edit-' + ${inv.id}"
                            aria-expanded="false">
                        Edit
                    </button>
                </td>
            </tr>
            <tr th:each="inv : ${inventoryList}">
                <td colspan="7" class="p-0 border-0">
                    <div class="collapse" th:id="'edit-' + ${inv.id}">
                        <div class="card card-body border-0 bg-light p-3">
                            <form th:action="@{/inventory/update/{id}(id=${inv.id})}" method="post" class="row g-3 align-items-end">
                                <div class="col-auto">
                                    <label class="form-label small mb-1">Track Inventory</label>
                                    <select name="trackInventory" class="form-select form-select-sm">
                                        <option value="true" th:selected="${inv.trackInventory}">On</option>
                                        <option value="false" th:selected="${!inv.trackInventory}">Off</option>
                                    </select>
                                </div>
                                <div class="col-auto">
                                    <label class="form-label small mb-1">Stock Quantity</label>
                                    <input type="number" name="stockQuantity" class="form-control form-control-sm"
                                           th:value="${inv.stockQuantity}" min="0" required>
                                </div>
                                <div class="col-auto">
                                    <label class="form-label small mb-1">Low Stock Threshold</label>
                                    <input type="number" name="lowStockThreshold" class="form-control form-control-sm"
                                           th:value="${inv.lowStockThreshold}" min="0" required>
                                </div>
                                <div class="col-auto">
                                    <button type="submit" class="btn btn-sm btn-primary">Save</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
