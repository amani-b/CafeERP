<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitchen Queue - Cafe ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cafe ERP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/menu}">Menu</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('STAFF','ADMIN')"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('KITCHEN','ADMIN')"><a class="nav-link active" aria-current="page" th:href="@{/kitchen}">Kitchen</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/reports}">Reports</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/inventory}">Inventory</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/account/password}">Change Password</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link border-0 bg-transparent" style="text-decoration:none;">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="mb-4">Kitchen Queue</h1>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info text-center">
        No active orders. All orders are completed.
    </div>

    <div class="row" th:each="order : ${orders}">
        <div class="col-12 mb-3">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>
                        <strong th:text="'Order #' + ${order.id}">Order #1</strong>
                        <span class="ms-2 badge bg-secondary" th:text="${order.status}">PENDING</span>
                    </span>
                    <small class="text-muted" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-04 08:00</small>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled mb-2">
                        <li th:each="item : ${order.items}" th:text="${item.itemName + ' x' + item.quantity}">
                            Latte x 2
                        </li>
                    </ul>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted" th:text="'Items: ' + ${order.itemCount} + ' | Total: $' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}">Items: 0 | Total: $0.00</span>
                        <form th:action="@{/kitchen/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <select name="status" class="form-select form-select-sm d-inline w-auto me-2" style="display:inline-block;">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${s == order.status}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">Update</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
