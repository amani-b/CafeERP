<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Receipt #' + ${order.id} + ' - Cafe ERP'">Receipt - Cafe ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { padding-top: 0 !important; }
        }
        .receipt-container { max-width: 600px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cafe ERP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/menu}">Menu</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}">Orders</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/reports}">Reports</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/inventory}">Inventory</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/account/password}">Change Password</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link border-0 bg-transparent" style="text-decoration:none;">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5 receipt-container">
    <div class="no-print mb-3">
        <a class="btn btn-outline-secondary" th:href="@{/orders}">&larr; Back to Orders</a>
        <button class="btn btn-primary" onclick="window.print()">Print</button>
    </div>

    <div class="card">
        <div class="card-body">
            <h2 class="card-title mb-1">Receipt</h2>
            <p class="text-muted mb-0">
                <span th:text="'Order #' + ${order.id}">Order #1</span>
            </p>
            <p class="text-muted">
                <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-04 08:00</span>
            </p>

            <hr>

            <table class="table table-sm">
                <thead>
                <tr>
                    <th>Item</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">Unit Price</th>
                    <th class="text-end">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.itemName}">Latte</td>
                    <td class="text-center" th:text="${item.quantity}">2</td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">3.50</td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">7.00</td>
                </tr>
                </tbody>
            </table>

            <hr>

            <div class="row">
                <div class="col-6"><strong>Items:</strong></div>
                <div class="col-6 text-end" th:text="${order.itemCount}">3</div>
            </div>
            <div class="row">
                <div class="col-6"><strong>Total:</strong></div>
                <div class="col-6 text-end" th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">10.50</div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
