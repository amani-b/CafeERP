<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Order - Cafe ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Cafe ERP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/menu}">Menu</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" th:href="@{/orders}">Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Inventory</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="mb-4">New Order</h1>

    <div class="alert alert-danger" role="alert" th:if="${errorMessage}" th:text="${errorMessage}">
        Select at least one available menu item.
    </div>

    <form action="/orders" th:action="@{/orders}" method="post">
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Menu Item</th>
                    <th>Category</th>
                    <th>Unit Price</th>
                    <th class="w-25">Quantity</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(menuItems)}">
                    <td colspan="4" class="text-center text-muted py-4">No available menu items.</td>
                </tr>
                <tr th:each="menuItem : ${menuItems}">
                    <td th:text="${menuItem.name}">Cappuccino</td>
                    <td th:text="${menuItem.category.name}">Beverages</td>
                    <td th:text="${#numbers.formatDecimal(menuItem.price, 1, 2)}">250.00</td>
                    <td>
                        <input type="number" min="0" value="0" class="form-control"
                               th:name="${'quantities[' + menuItem.id + ']'}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <button type="submit" class="btn btn-primary" th:disabled="${#lists.isEmpty(menuItems)}">Create Order</button>
        <a class="btn btn-outline-secondary" th:href="@{/orders}">Cancel</a>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
