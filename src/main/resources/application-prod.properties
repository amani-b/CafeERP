# -------------------------------
# PRODUCTION - NO DEFAULTS
# -------------------------------
# Every required env var MUST be set; missing values cause fast-failure at startup.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.thymeleaf.cache=true
spring.jpa.show-sql=false

# Production logging — INFO level for application code
logging.level.com.cafeerp=INFO

# Reverse proxy / load balancer support
# The platform terminates HTTPS at the edge and forwards requests over plain HTTP
# internally. This tells Spring to trust X-Forwarded-* headers so that redirect
# URLs, secure cookies, and CSRF tokens are generated correctly.
server.forward-headers-strategy=framework

# Mark session cookies as secure — safe here because the platform terminates real
# HTTPS in front of this app. Do NOT set this in the dev profile.
server.servlet.session.cookie.secure=true
